<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBWorld — AI Game Observer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e17; color: #e0e0e0;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    background: rgba(0,0,0,0.8); padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #1a2035;
  }
  header h1 { font-size: 16px; color: #60a5fa; font-weight: 600; }
  header .status { font-size: 12px; color: #888; }
  .container { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 320px; background: rgba(0,0,0,0.6);
    border-right: 1px solid #1a2035; overflow-y: auto; padding: 8px;
  }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .events {
    flex: 1; overflow-y: auto; padding: 12px; font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .event {
    padding: 4px 8px; margin: 2px 0; border-radius: 4px;
    background: rgba(255,255,255,0.03); border-left: 3px solid #333;
  }
  .event.turn_start { border-left-color: #60a5fa; }
  .event.agent_action { border-left-color: #34d399; }
  .event.error { border-left-color: #f87171; }
  .agent-card {
    background: rgba(255,255,255,0.05); border-radius: 6px;
    padding: 10px; margin-bottom: 8px;
  }
  .agent-card h3 { font-size: 13px; color: #60a5fa; margin-bottom: 4px; }
  .agent-card .stat { font-size: 12px; color: #aaa; margin: 2px 0; }
  .agent-card .stat span { color: #e0e0e0; font-weight: 500; }
  .controls { padding: 8px 16px; background: rgba(0,0,0,0.7); border-top: 1px solid #1a2035; }
  .controls input {
    width: 100%; padding: 8px 12px; background: #1a2035; border: 1px solid #2a3045;
    border-radius: 4px; color: #e0e0e0; font-size: 13px; outline: none;
  }
  .controls input:focus { border-color: #60a5fa; }
  #connection-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  #connection-dot.connected { background: #34d399; }
  #connection-dot.disconnected { background: #f87171; }
</style>
</head>
<body>
<header>
  <h1>XBWorld AI Observer</h1>
  <div class="status">
    <span id="connection-dot" class="disconnected"></span>
    <span id="status-text">Connecting...</span>
  </div>
</header>
<div class="container">
  <div class="sidebar" id="agents-panel"></div>
  <div class="main">
    <div class="events" id="events-log"></div>
    <div class="controls">
      <input id="cmd-input" placeholder="Type agent_name command (e.g. 'alpha research Alphabet')" />
    </div>
  </div>
</div>
<script>
const API_BASE = window.location.origin;
let eventSource = null;

function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource(API_BASE + '/game/events');
  const dot = document.getElementById('connection-dot');
  const statusText = document.getElementById('status-text');

  eventSource.onopen = () => {
    dot.className = 'connected';
    statusText.textContent = 'Connected';
  };
  eventSource.onerror = () => {
    dot.className = 'disconnected';
    statusText.textContent = 'Reconnecting...';
  };
  eventSource.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      appendEvent(event);
    } catch (err) {}
  };
}

function appendEvent(event) {
  const log = document.getElementById('events-log');
  const div = document.createElement('div');
  div.className = 'event ' + (event.type || '');
  const ts = new Date().toLocaleTimeString();
  let text = `[${ts}] `;
  if (event.agent) text += `<b>${event.agent}</b> `;
  if (event.type === 'turn_start') {
    text += `Turn ${event.turn} started`;
  } else if (event.type === 'agent_action') {
    text += `${event.tool}(${JSON.stringify(event.args || {})}) → ${(event.result || '').substring(0, 100)}`;
  } else {
    text += JSON.stringify(event).substring(0, 200);
  }
  div.innerHTML = text;
  log.appendChild(div);
  if (log.children.length > 500) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

async function refreshAgents() {
  try {
    const resp = await fetch(API_BASE + '/game/status');
    const data = await resp.json();
    const panel = document.getElementById('agents-panel');
    if (data.status === 'no_game') {
      panel.innerHTML = '<div class="agent-card"><h3>No game running</h3></div>';
      return;
    }
    const agents = data.agents || [];
    document.getElementById('status-text').textContent =
      `Connected — ${agents.length} agents, port ${data.server_port || '?'}`;
    panel.innerHTML = agents.map(a => `
      <div class="agent-card">
        <h3>${a.name} <span style="color:#666;font-weight:normal;font-size:11px">${a.connected ? '● online' : '○ offline'}</span></h3>
        <div class="stat">Turn: <span>${a.turn}</span> | Phase: <span>${a.phase}</span></div>
        <div class="stat">Gold: <span>${a.gold ?? '?'}</span> | Cities: <span>${a.cities}</span> | Units: <span>${a.units}</span></div>
        <div class="stat">Research: <span>${a.researching || 'None'}</span> ${a.tech_cost > 0 ? `(${a.bulbs}/${a.tech_cost})` : ''} | Techs: <span>${a.known_techs ?? 0}</span></div>
        <div class="stat">Tax: <span>${a.tax ?? '?'}%</span> Sci: <span>${a.science ?? '?'}%</span> Lux: <span>${a.luxury ?? '?'}%</span></div>
        ${a.perf ? `<div class="stat">Avg turn: <span>${a.perf.avg_turn_s}s</span> | Last LLM: <span>${a.perf.last_turn_llm_s}s</span></div>` : ''}
        ${a.last_report ? `<div class="stat" style="color:#888;font-style:italic;margin-top:4px">${a.last_report.substring(0, 120)}</div>` : ''}
      </div>
    `).join('');
  } catch (e) {}
}

document.getElementById('cmd-input').addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (!val) return;
  e.target.value = '';
  const parts = val.split(/\s+/, 2);
  if (parts.length === 2) {
    try {
      await fetch(API_BASE + `/agents/${parts[0]}/command`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({command: parts[1]}),
      });
      appendEvent({type: 'command_sent', agent: parts[0], result: parts[1]});
    } catch (err) {
      appendEvent({type: 'error', result: 'Failed to send command: ' + err.message});
    }
  }
});

connectSSE();
refreshAgents();
setInterval(refreshAgents, 5000);
</script>
</body>
</html>
